name: CI Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install
        working-directory: ./packages/backend

      - run: npm run test || true
        working-directory: ./packages/backend

      - run: npx playwright install --with-deps

      - run: npx playwright test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
